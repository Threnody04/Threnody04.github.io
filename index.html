    <!-- ===== 字符避让互动效果 JS ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chars = document.querySelectorAll('.char');
            let mouseX = -1000;
            let mouseY = -1000;

            // 记录鼠标实时位置
            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            // 为每个字符初始化坐标数据
            const charData = Array.from(chars).map(char => ({
                el: char,
                x: 0, // 当前 X 偏移量
                y: 0, // 当前 Y 偏移量
            }));

            const repelRadius = 140; // 鼠标的“排斥力场”半径 (距离多近开始躲避)
            const pushForce = 40;    // 最远被推开的距离 (像素)

            function animate() {
                charData.forEach(data => {
                    // 获取字符当前的绝对中心点
                    const rect = data.el.getBoundingClientRect();
                    // 这里要减去它当前的偏移量，获得它原本静止时的真实中心点位置
                    const centerX = rect.left - data.x + rect.width / 2;
                    const centerY = rect.top - data.y + rect.height / 2;

                    // 计算鼠标到字符中心的距离
                    const dx = centerX - mouseX;
                    const dy = centerY - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    let targetX = 0;
                    let targetY = 0;

                    // 如果鼠标进入了排斥力场
                    if (distance < repelRadius && distance > 0) {
                        // 越靠近鼠标，排斥力越大 (0 到 1)
                        const force = (repelRadius - distance) / repelRadius;

                        // 计算被推开的目标位置 (向鼠标的反方向推)
                        targetX = (dx / distance) * force * pushForce;
                        targetY = (dy / distance) * force * pushForce;
                    }

                    // 缓动动画 (Lerp)：让字符丝滑地移动到目标位置，而不是瞬间瞬移
                    data.x += (targetX - data.x) * 0.05;
                    data.y += (targetY - data.y) * 0.05;

                    // 应用位移，并在被推开时加入发光效果
                    data.el.style.transform = `translate(${data.x}px, ${data.y}px)`;

                    if (Math.abs(data.x) > 1 || Math.abs(data.y) > 1) {
                        data.el.style.color = '#2EFF4F'; // 躲避时变成荧光绿
                        data.el.style.textShadow = '0 0 15px rgba(46, 255, 79, 0.8)';
                    } else {
                        data.el.style.color = ''; // 回归原位时恢复原色
                        data.el.style.textShadow = '';
                    }
                });

                requestAnimationFrame(animate); // 持续循环刷新
            }

            animate(); // 启动动画
        });
    </script>
    <!-- ==========================================
         全局转场动画控制脚本
    =========================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 页面进入时的淡出动画
            const transitionOverlay = document.querySelector('.page-transition-overlay');
            if (transitionOverlay) {
                setTimeout(() => {
                    transitionOverlay.classList.add('loaded');
                }, 0);
            }

            // 2. 拦截所有的 <a> 标签点击事件，制造页面离开时的黑屏动画
            const links = document.querySelectorAll('a');
            links.forEach(link => {
                link.addEventListener('click', function (e) {
                    const targetUrl = this.getAttribute('href');
                    const targetBlank = this.getAttribute('target');

                    // 排除：没有链接、锚点链接（如 #xxx）、新窗口打开的链接、或者是发邮件的链接
                    if (!targetUrl || targetUrl.startsWith('#') || targetBlank === '_blank' || targetUrl.startsWith('mailto:')) {
                        return; // 不拦截，走默认行为
                    }

                    // 阻止默认的瞬间跳转
                    e.preventDefault();

                    // 去除 loaded 类，让黑屏加载圈重新淡入
                    transitionOverlay.classList.remove('loaded');

                    // 等待 600 毫秒（等待黑屏完全盖住页面），然后再跳转
                    setTimeout(() => {
                        window.location.href = targetUrl;
                    }, 600);
                });
            });
        });
    </script>
